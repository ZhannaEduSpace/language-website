  <h2>🗣️ Язык как инструмент власти и идентичности (C1)</h2>
  <p class="instruction">Послушайте аудиозапись и ответьте на вопросы.</p>

 <audio controls controlsList="nodownload noplaybackrate">
    <source src="audio/language_ru_c1.mp3" type="audio/mpeg">

 <form id="quizForm"></form>
  <button type="button" onclick="checkAnswers()">Check Answers</button>
  <div class="result" id="result"></div>

  <script>
    const questions = [
  {
    q: `То, как челове́к говори́т, мо́жет мно́гое рассказа́ть о его́ социа́льном и культу́рном фо́не.`,
    a: 'Пра́вда',
    options: ['Пра́вда', 'Ложь']
  },
  {
    q: `Публи́чные ли́чности испо́льзуют эмоциона́льный язы́к спонта́нно, без осо́бого у́мысла.`,
    a: 'Ложь',
    options: ['Пра́вда', 'Ложь']
  },
  {
    q: `Перехо́д с одного́ языка́ на друго́й помога́ет лю́дям выра́жать ра́зные сто́роны свое́й ли́чности.`,
    a: 'Пра́вда',
    options: ['Пра́вда', 'Ложь']
  },
  {
    q: `Нестанда́ртные вариа́нты языка́ обы́чно счита́ются бо́лее прести́жными и интеллектуа́льными.`,
    a: 'Ложь',
    options: ['Пра́вда', 'Ложь']
  },
  {
    q: ` Язы́к игра́ет ва́жную роль в формирова́нии на́шей реа́льности и социа́льных свя́зей.`,
    a: 'Пра́вда',
    options: ['Пра́вда', 'Ложь']
  }
    ];

    const form = document.getElementById('quizForm');

    questions.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'quiz-question';
      div.id = `q${i+1}-block`;
      div.innerHTML = `<p>${i+1}. ${item.q}</p>` +
        item.options.map(opt => `
          <label><input type="radio" name="q${i+1}" value="${opt}"> ${opt}</label><br>`).join('');
      form.appendChild(div);
    });

   function checkAnswers() {
  let score = 0;

  questions.forEach((item, i) => {
    const name = `q${i+1}`;
    const selected = form.querySelector(`input[name="${name}"]:checked`);
    const block = document.getElementById(`${name}-block`);
    const existing = block.querySelector('.correct-answer');

    if (existing) existing.remove();

    const note = document.createElement('div');
    note.classList.add('correct-answer');

    if (!selected) {
      note.classList.add('incorrect');
      note.innerText = '⚠️ Сначала выберите вариант ответа.';
    } else if (selected.value === item.a) {
      note.classList.add('correct');
      note.innerText = `✅ Правильный ответ: ${item.a}`;
      score++;
    } else {
      note.classList.add('incorrect');
      note.innerText = `❌ Правильный ответ: ${item.a}`;
    }

    block.appendChild(note);
  });

  document.getElementById('result').innerText = `Вы правильно ответили на ${score} из ${questions.length} вопросов.`;
}
  </script>
