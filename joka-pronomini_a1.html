  <h2>✏️ Joka-pronomini (A2)</h2>

 <p><strong>Harjoitus 1. Täydennä lause valitsemalla oikea muoto: joka tai jotka.</strong><br>Esimerkiksi: Tässä on kirja, <em>joka</em> on todella mielenkiintoinen.</p>
  <p><strong>⚠️ Huom!:</strong> Käytä suomalaisia kirjaimia (ä, ö)</p>

  <form id="quizForm"></form>

  <button type="button" onclick="checkAnswers()">Tarkista vastaukset</button>
  <div class="result" id="result"></div>

  <script>
    const questions = [
      { q: 'Minulla on kirja, ___ on pöydällä.', a: 'joka' },
      { q: 'Tapasin ihmiset, ___ auttoivat minua.', a: 'jotka' },
      { q: 'Näen talon, ___ on vanha.', a: 'joka' },
      { q: 'Hän osti kengät, ___ ovat mustat.', a: 'jotka' },
      { q: 'Tämä on elokuva, ___ on erittäin suosittu.', a: 'joka' },
      { q: 'Meillä on ystävät, ___ asuvat Suomessa.', a: 'jotka' },
      { q: 'Muistan ne päivät, ___ olivat vaikeita.', a: 'jotka' },
      { q: 'Tässä on koira, ___ juoksee nopeasti.', a: 'joka' },
      { q: 'Löysin avaimet, ___ olivat kadonneet.', a: 'jotka' },
      { q: 'Hän puhui asiasta, ___ oli tärkeä.', a: 'joka' },
    ];

    const form = document.getElementById('quizForm');

    questions.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.id = `q${i+1}-block`;

      const parts = item.q.split('___');
      let sentenceHTML = '';

     if (parts.length === 2) {
  sentenceHTML = `${parts[0]} <input type="text" id="input${i}" placeholder="Kirjoita sana"> ${parts[1]}`;
} else {
  sentenceHTML = item.q.replace(item.a, `<input type="text" id="input${i}" placeholder="Kirjoita sana">`);
}

      div.innerHTML = `<label>${i + 1}. ${sentenceHTML}</label>`;
      form.appendChild(div);
    });

     function normalize(str) {
    return str.trim().toLowerCase();
  }

  function checkAnswers() {
    let score = 0;

    questions.forEach((item, i) => {
      const input = document.getElementById(`input${i}`);
      const userAnswer = normalize(input.value);
      const correctAnswer = normalize(item.a);

      // удалить прошлый фидбек
      const old = document.querySelector(`#q${i + 1}-block .correct-answer`);
      if (old) old.remove();

      // создать новый фидбек
      const msg = document.createElement('div');
      msg.classList.add('correct-answer');

      if (userAnswer === "") {
        msg.classList.add("incorrect");
        msg.textContent = "⚠️ Kirjoita ensin vastaus!";
      } else if (userAnswer === correctAnswer) {
        msg.classList.add("correct");
        msg.textContent = `✅ Oikein: ${item.a}`;
        score++;
      } else {
        msg.classList.add("incorrect");
        msg.textContent = `❌ Ei ihan oikein. Oikea vastaus: ${item.a}`;
      }

      document.getElementById(`q${i + 1}-block`).appendChild(msg);
    });

    document.getElementById('result').innerText =
      `Sait ${score} oikein ${questions.length}:stä.`;
  }
</script>
