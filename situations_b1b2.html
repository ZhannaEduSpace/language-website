  <h2>🗣 Что сказа́ть в ситуа́ции? (B1–B2)</h2>
  <p><strong>Вы́берите фра́зу, кото́рая подхо́дит по смы́слу, сти́лю, ле́ксике и грамма́тике.
</strong><br>В ка́ждом вопро́се то́лько оди́н пра́вильный отве́т.</p>

  <form id="quizForm"></form>
  <button type="button" onclick="checkAnswers()">Проверить ответы</button>
  <div class="result" id="result"></div>

  <script>
    const questions = [
      {
        q: '1. Ситуа́ция:\n👩‍💼 Ты прихо́дишь на собесе́дование и здоро́ваешься с работода́телем. Что ты ска́жешь?',
        a: 'До́брое у́тро. О́чень рад вас ви́деть.',
        options: ['Здоро́во, вы кто тако́й?', 'До́брое у́тро. О́чень рад вас ви́деть.', 'Я бы́л(а́) на интервью́.']
      },
      {
        q: '2. Ситуа́ция:\n🍲 Ты в рестора́не, и тебе́ прино́сят не то блю́до. Что ты ска́жешь?',
        a: 'Прости́те, но э́то не то, что я зака́зывал(а).',
        options: ['Прости́те, но э́то не то, что я зака́зывал(а).', 'Эй! Что э́то бы́ло вообще́ тако́е?', 'Я ку́шаю э́то, потому́ что оно́ пришло́.']
      },
      {
        q: '3. Ситуа́ция:\n📞 Ты звони́шь дру́гу, но он не берёт тру́бку. Ты оставля́ешь голосово́е сообще́ние. Что ты ска́жешь?',
        a: 'Приве́т! Я звони́л(а) тебе́, перезвони́, пожа́луйста.',
        options: ['Почему́ вы не берёте?! Я вам звони́л(а) пять раз!!', 'Приве́т! Я звони́л(а) тебе́, перезвони́, пожа́луйста.', 'У тебя́ пробле́ма с телефо́ном. Испра́вь его́!']
      },
      {
        q: '4. Ситуа́ция:\n🕒 Ты опа́здываешь на встре́чу с преподава́телем. Что ты ска́жешь?',
        a: 'Извини́те за опозда́ние, бы́л(а́) в про́бке.',
        options: ['Извини́те за опозда́ние, бы́л(а́) в про́бке.', 'Я приду́ по́здно, ничего́ стра́шного.', 'Я пришёл (пришла́) позже, потому́ что мне всё равно́.']
      },
      {
        q: '5. Ситуа́ция:\n🎉 Твой друг получи́л но́вую рабо́ту. Что ты ска́жешь?',
        a: 'Молоде́ц! Поздравля́ю тебя́!',
        options: ['Ну, наконе́ц-то, а то он безде́льничал.', 'Вы получи́ли рабо́ту, потому́ что повезло́.', 'Молоде́ц! Поздравля́ю тебя́!']
      },
      {
        q: '6. Ситуа́ция:\n📧 Ты пи́шешь официа́льное письмо́ в университе́т. Что ты напи́шешь?',
        a: 'Здра́вствуйте. Прошу́ присла́ть докуме́нты по по́чте.',
        options: ['Здра́вствуйте. Прошу́ присла́ть докуме́нты по по́чте.', 'Эй, ски́ньте мне бума́ги, мне на́до.', 'Я хочу́, что́бы вы де́лали то, что я скажу́.']
      }
    ];

    const form = document.getElementById('quizForm');

    questions.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'quiz-question';
      div.id = `q${i+1}-block`;
      div.innerHTML = `<h3>${item.q.replace(/\n/g, '<br>')}</h3>` +
        item.options.map(opt => `
          <label><input type="radio" name="q${i+1}" value="${opt}"> ${opt}</label><br>`).join('');
      form.appendChild(div);
    });

    function checkAnswers() {
      let score = 0;
      questions.forEach((item, i) => {
        const name = `q${i+1}`;
        const selected = form.querySelector(`input[name=${name}]:checked`);
        const block = document.getElementById(`${name}-block`);
        const existing = block.querySelector('.correct-answer');
        if (existing) existing.remove();
        const note = document.createElement('div');
        note.classList.add('correct-answer');

         if (!selected) {
  note.classList.add('incorrect');
  note.innerText = '⚠️ Сначала выберите хотя бы один вариант.';
} else if (selected.value === item.a) {
  note.classList.add('correct');
  note.innerText = `✅ Правильный ответ: ${item.a}`;
  score++;
} else {
  note.classList.add('incorrect');
  note.innerText = `❌ Правильный ответ: ${item.a}`;
}
        block.appendChild(note);
      });
      document.getElementById('result').innerText = `Вы правильно ответили на ${score} из ${questions.length} вопросов.`;
    }
  </script>
