 <h2>💡 Sanatyypit: e-sanat (A2)</h2>

<p><strong>Harjoitus 1. Kirjoita sanat oikeassa muodossa.</strong></p>
<p>Esimerkiksi: <em>alue → aluetta, alueen, alueessa</em></p>
<p><strong>⚠️ Huom!:</strong> Käytä suomalaisia kirjaimia (ä, ö)</p>

<form id="quizFormE"></form>

<button type="button" onclick="checkAnswersE()">Tarkista vastaukset</button>
<div class="result" id="resultE"></div>

<script>
  const questionsE = [
    { base: "perhe", partitive: "perhettä", genitive: "perheen", inessive: "perheessä" },
    { base: "vene", partitive: "venettä", genitive: "veneen", inessive: "veneessä" },
    { base: "huone", partitive: "huonetta", genitive: "huoneen", inessive: "huoneessa" },
    { base: "kone", partitive: "konetta", genitive: "koneen", inessive: "koneessa" },
    { base: "kirje", partitive: "kirjettä", genitive: "kirjeen", inessive: "kirjeessä" }
  ];

  const formE = document.getElementById("quizFormE");

  const headerE = document.createElement("div");
  headerE.className = "case-grid case-header";
  headerE.innerHTML = `
    <div>Perusmuoto</div>
    <div>Partitiivi</div>
    <div>Genetiivi</div>
    <div>Missä?</div>
  `;
  formE.appendChild(headerE);

  questionsE.forEach((q, index) => {
    const div = document.createElement("div");
    div.className = "case-grid case-row";
    div.id = `qe-${index}`;

    div.innerHTML = `
      <div class="base-word">${index + 1}. ${q.base}</div>

      <div class="input-block">
        <input type="text" id="inputE-${index}_partitive" placeholder="Partitiivi">
        <div id="feedbackE-${index}_partitive"></div>
      </div>

      <div class="input-block">
        <input type="text" id="inputE-${index}_genitive" placeholder="Genetiivi">
        <div id="feedbackE-${index}_genitive"></div>
      </div>

      <div class="input-block">
        <input type="text" id="inputE-${index}_inessive" placeholder="Missä?">
        <div id="feedbackE-${index}_inessive"></div>
      </div>
    `;

    formE.appendChild(div);
  });

  function normalizeE(str) {
    return str
      .trim()
      .toLowerCase()
      .replace(/\s+/g, " ");
  }

  function checkOneE(inputId, feedbackId, userAnswer, correctAnswer, label) {
    const feedback = document.getElementById(feedbackId);
    feedback.innerHTML = "";

    const msg = document.createElement("div");

    if (userAnswer === "") {
      msg.className = "incorrect";
      msg.textContent = "⚠️ Kirjoita ensin vastaus!";
      feedback.appendChild(msg);
      return 0;
    } else if (userAnswer === correctAnswer) {
      msg.className = "correct";
      msg.textContent = `✅ Oikein: ${correctAnswer}`;
      feedback.appendChild(msg);
      return 1;
    } else {
      msg.className = "incorrect";
      msg.textContent = `❌ ${label} väärin. Oikea: ${correctAnswer}`;
      feedback.appendChild(msg);
      return 0;
    }
  }

  function checkAnswersE() {
    let score = 0;

    questionsE.forEach((q, i) => {
      const inputPartitive = normalizeE(document.getElementById(`inputE-${i}_partitive`).value);
      const inputGenitive = normalizeE(document.getElementById(`inputE-${i}_genitive`).value);
      const inputInessive = normalizeE(document.getElementById(`inputE-${i}_inessive`).value);

      score += checkOneE(
        `inputE-${i}_partitive`,
        `feedbackE-${i}_partitive`,
        inputPartitive,
        normalizeE(q.partitive),
        "Partitiivi"
      );

      score += checkOneE(
        `inputE-${i}_genitive`,
        `feedbackE-${i}_genitive`,
        inputGenitive,
        normalizeE(q.genitive),
        "Genetiivi"
      );

      score += checkOneE(
        `inputE-${i}_inessive`,
        `feedbackE-${i}_inessive`,
        inputInessive,
        normalizeE(q.inessive),
        "Missä?"
      );
    });

    const total = questionsE.length * 3;
    document.getElementById("resultE").innerText = `Sait ${score} oikein ${total}:stä.`;
  }
</script>
